<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spa Website</title>
  <style>
    body {
  font-family: Arial;
  margin: 0;
  background: #f9f9f9;
}

header {
  background: pink;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav a {
  margin: 10px;
  text-decoration: none;
  color: black;
  font-weight: bold;
}

.hero {
  background: rgb(227, 184, 184);
  padding: 60px;
  text-align: center;
}

section {
  padding: 40px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: #d7c0c0;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px #d279aa;
}
.gallery{
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
    padding: 20px;
}

.gallery img {
  width: 200px;
  height: 300px;
  object-fit: cover;
  border-radius: 10px;
}

form {
  background: white;
  width: 300px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px #ea85c3;
}

form input, form select {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 90%;
}

button {
  padding: 10px 20px;
  background: pink;
  border: none;
  cursor: pointer;
}

button:hover {
  background: hotpink;
}
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header>
    <h1>beauty salon & Spa</h1>
    <nav>
      <a href="#services">Services</a>
